<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSD 340 Web Development with HTML and CSS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Assignment 10.3: JavaScript - Part 2</h1>
</header>

<p id="instruction">Click the images below to flip them</p>

<div class="gallery-container">
    <div class="image-container">
        <img class="clickable-image"
             src="mullen.jpeg"
             data-original="mullen.jpeg"
             data-hover="mullen only.png"
             alt="First Instrument">
    </div>

    <div class="image-container">
        <img class="clickable-image"
             src="telecaster.jpeg"
             data-original="telecaster.jpeg"
             data-hover="tele only.png"
             alt="Second Instrument">
    </div>
</div>

<footer>
    <p>&copy; 2026 Denzlinger</p>
    <a href="https://denzlinger-lab.github.io/csd-portfolio/" target="_blank" class="portal-link">back to Landing Page</a>
</footer>

<script>
    // --- 1. Instruction Text Hover ---
    const tip = document.getElementById('instruction');

    tip.addEventListener('mouseover', () => {
        tip.style.color = '#ffb347';
    });

    tip.addEventListener('mouseout', () => {
        tip.style.color = '#aaa';
    });


    // --- 2. Image Click Toggle Logic ---

    // Function for "onclick" event
    function flipImage(event) {
        const img = event.currentTarget;
        const original = img.getAttribute('data-original');
        const hover = img.getAttribute('data-hover');
        const currentSrc = img.getAttribute('src');

        if (currentSrc === original) {
            img.setAttribute('src', hover);
        } else {
            img.setAttribute('src', original);
        }
    }

    const images = document.querySelectorAll('.clickable-image');

    // Preload hover assets and assign onclick MouseEvent
    images.forEach(img => {
        const preloader = new Image();
        preloader.src = img.getAttribute('data-hover');

        // Assigning the function via the "onclick" MouseEvent property
        img.onclick = flipImage;
    });
</script>

</body>
</html>
